# Render.com Blueprint - Clinic Management System
# Uses Neon for database (add DATABASE_URL in Render Dashboard)

services:
  - type: web
    name: clinic-management-system
    env: node
    plan: free

    # Build & start
    buildCommand: npm install
    startCommand: npm start

    # Environment variables - ADD DATABASE_URL in Render Dashboard (Neon connection string)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # DATABASE_URL: Add manually in Render Dashboard → Environment
      # Get from: Neon → Connection details → Connection string (URI with ?sslmode=require)
