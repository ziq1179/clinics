services:
  - type: web
    name: clinic-management-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: clinic-db
    plan: free
    databaseName: clinic_management
    user: clinic_user
